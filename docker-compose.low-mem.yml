# Low-memory override for constrained environments.
# Usage: docker compose -f docker-compose.yml -f docker-compose.low-mem.yml up
#
# Reduces total memory budget from ~2.5 GB to ~1.5 GB.
# Suitable for Docker Desktop configured with 2 GB RAM.

services:
  redpanda:
    # `command:` is replaced wholesale by an override (not merged), so the dual
    # advertised listeners from docker-compose.yml must be repeated here — only
    # the --memory budget changes. See docker-compose.yml for the listener
    # rationale (internal redpanda:9092 + external localhost:19092).
    command: >
      redpanda start
        --smp 1 --memory 256M --reserve-memory 0M
        --overprovisioned --node-id 0
        --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
        --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092

  risingwave:
    environment:
      RW_TOTAL_MEMORY_BYTES: "536870912"   # 512 MB
