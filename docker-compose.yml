# marketplace-streaming — docker-compose service topology
#
# Phase 0: SKELETON ONLY — services declared and documented, not invoked in CI.
# Phase 1 will add health checks, volume mounts for SQL init files, and
# the generator/dagster Dockerfiles.
#
# Startup order:
#   redpanda (healthy) → redpanda-init (exits 0)
#   → risingwave + generator (parallel, both depend on redpanda healthy)
#   → dagster (depends on risingwave + clickhouse healthy)
#
# Memory budget (~2.5 GB total). Docker Desktop must be configured to at
# least 4 GB. See docker-compose.low-mem.yml for constrained environments.
#
# One-command demo (Phase 1+): docker compose up --build

services:

  redpanda:
    image: redpandadata/redpanda:v23.3.18
    # Dual advertised listeners. Two Kafka listeners are required so that BOTH
    # in-network clients AND host clients connect with a usable broker address:
    #   internal://redpanda:9092  — resolves on the compose network (RisingWave's
    #                               CREATE SOURCE bootstrap.server uses this).
    #   external://localhost:19092 — resolves from the host (the integration test
    #                               producer/consumer and local `rpk` use this).
    # A single advertised listener cannot serve both: a client always reconnects
    # to the *advertised* host returned by metadata, so the advertised name must
    # be reachable from where the client runs. See ADR-0002 "Dual listeners".
    command: >
      redpanda start
        --smp 1 --memory 512M --reserve-memory 0M
        --overprovisioned --node-id 0
        --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
        --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "9092:9092"     # Kafka API (internal listener — in-network only)
      - "19092:19092"   # Kafka API (external listener — host clients)
      - "9644:9644"     # Admin (rpk)
      - "8081:8081"     # Schema registry
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--api-urls", "localhost:9644"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  redpanda-init:
    # One-shot: creates the four event topics. rpk skips existing topics on
    # restart — idempotent by default. 4 partitions / 1 replica for local demo.
    image: redpandadata/redpanda:v23.3.18
    depends_on:
      redpanda:
        condition: service_healthy
    restart: on-failure
    command: >
      rpk topic create
        order_placed shipment_created delivery_update seller_activity
        --brokers redpanda:9092
        --partitions 4 --replicas 1

  risingwave:
    image: risingwavelabs/risingwave:v1.8.2
    # `single-node` is RisingWave v1.8's all-in-one command; bare `standalone`
    # panics ("No service is specified to start") without explicit service opts.
    command: single-node
    ports:
      - "4566:4566"   # SQL (psql-compatible: psql -h localhost -p 4566 -U root)
      - "5691:5691"   # Meta gRPC (internal)
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      # The RisingWave image has no pg_isready; probe the SQL port over TCP instead.
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/4566'"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - risingwave_data:/var/lib/risingwave
    environment:
      RW_TOTAL_MEMORY_BYTES: "1073741824"   # 1 GB cap for CI safety

  clickhouse:
    # Fully pinned to a specific patch (matches the Redpanda/RisingWave pin style).
    # The floating 24.3-alpine tag drifts within the 24.3 LTS track; pin the patch
    # so behaviour is reproducible across runs. Bump deliberately via PR.
    image: clickhouse/clickhouse-server:24.3.18.7-alpine
    ports:
      - "8123:8123"   # HTTP API (used by Dagster)
      - "9000:9000"   # Native protocol
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      # Re-open the `default` user beyond loopback so the Dagster service (in-network)
      # and the integration test (host, published port) can connect. The alpine
      # image otherwise restricts `default` to 127.0.0.1/::1. See the file header.
      - ./clickhouse/users.d/access.xml:/etc/clickhouse-server/users.d/access.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  generator:
    build: ./generator
    depends_on:
      redpanda:
        condition: service_healthy
      redpanda-init:
        condition: service_completed_successfully
    environment:
      REDPANDA_BROKERS: redpanda:9092
      SEED: "42"
      EVENTS_PER_SECOND: "50"
      TIME_ACCELERATION_FACTOR: "3600"    # 1 real-second = 1 sim-hour
      SIM_START: "2024-01-01T00:00:00Z"
      FAULT_CONTROL_FILE: /shared/fault_injection.json
      OLIST_DATA_DIR: ""                  # unset = fully-synthetic fallback
    volumes:
      - ./shared:/shared
    restart: on-failure

  dagster:
    # Built from the repo ROOT so the generator + reconciliation packages and the
    # integration dependency group (dagster, dagster-webserver, psycopg2,
    # clickhouse-driver) are installed. See dagster_service/Dockerfile.
    # NOTE: the build context dir is dagster_service/, NOT dagster/ — a top-level
    # `dagster/` dir would shadow the installed `dagster` PyPI package on sys.path
    # and break `import dagster` (namespace-package collision).
    build:
      context: .
      dockerfile: dagster_service/Dockerfile
    ports:
      - "3000:3000"   # Dagster UI + daemon (dagster dev)
    depends_on:
      risingwave:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      RISINGWAVE_HOST: risingwave
      RISINGWAVE_PORT: "4566"
      CLICKHOUSE_HOST: clickhouse
      # clickhouse_driver speaks the NATIVE protocol (9000), not HTTP (8123).
      CLICKHOUSE_PORT: "9000"
    restart: on-failure

volumes:
  redpanda_data:
  risingwave_data:
  clickhouse_data:
