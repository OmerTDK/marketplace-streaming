name: CI

on:
  pull_request:
    # `labeled` is required so adding the `run-integration` label triggers a run
    # (the default types — opened/synchronize/reopened — do not fire on labeling,
    # which would make the gated integration job below unreachable via the label).
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]
  workflow_dispatch: {}  # manual trigger for the gated integration job

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    # No containers required: generator uses InMemorySink, sqlfluff runs offline.
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
      - run: uv sync --frozen
      - run: uv pip install -e .
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - name: sqlfluff lint (RisingWave/ansi — parse errors suppressed, see .sqlfluff)
        run: uv run sqlfluff lint sql/
      - run: uv run pytest -v -m "not integration"

  integration:
    runs-on: ubuntu-latest
    # Gated: only runs on workflow_dispatch or when the PR has the 'run-integration' label.
    # This keeps the default CI fast (no containers, ~5s) while allowing full
    # topology validation on demand. See docs/adr/0004-ci-strategy.md.
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-integration')
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.0
      - run: uv sync --frozen --group integration
      - run: uv pip install -e .
      - run: uv run pytest tests/integration/ -v --timeout=300

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.3.0
      - run: uv sync --frozen
      - name: bandit (Python SAST)
        run: uv run bandit -r generator reconciliation -c pyproject.toml
      - name: pip-audit (dependency CVEs)
        run: uv run pip-audit
      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
