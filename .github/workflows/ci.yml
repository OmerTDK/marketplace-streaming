name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    # No containers required: generator uses InMemorySink, sqlfluff runs offline.
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --frozen
      - run: uv pip install -e .
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - name: sqlfluff lint (RisingWave/ansi — parse errors suppressed, see .sqlfluff)
        run: uv run sqlfluff lint sql/
      - run: uv run pytest -v
